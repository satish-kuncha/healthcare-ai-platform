version: '3.8'

services:
  # The FastAPI Backend Brain
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./healthcare_state.db:/code/healthcare_state.db

  # The React Voice UI
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend